name: stellar_vortex
description: "Stellar Vortex - A space shooter mobile game built with Flutter and Flame."
publish_to: "none" # Remove this line if you wish to publish to pub.dev
version: 1.0.1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flame: ^1.37.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  image: ^4.8.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/planet_parts/
